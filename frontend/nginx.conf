map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

map $host $invalid_local_host {
  default 1;
  localhost 0;
  127.0.0.1 0;
}

server {
  listen 3210;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 256m;

  if ($invalid_local_host) {
    return 403;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Frame-Options "DENY" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.github.com; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; base-uri 'none'; frame-ancestors 'none';" always;

  error_page 413 = @payload_too_large;

  location /api/ {
    proxy_pass http://127.0.0.1:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host localhost:8080;
    proxy_set_header X-Forwarded-For "";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 1d;
  }

  location = /health {
    proxy_pass http://127.0.0.1:8080/health;
    proxy_http_version 1.1;
    proxy_set_header Host localhost:8080;
    proxy_set_header X-Forwarded-For "";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location @payload_too_large {
    default_type application/json;
    return 413 '{"error":"Uploaded database is too large. Maximum import size is 256 MiB."}';
  }
}
